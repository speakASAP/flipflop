apiVersion: v1
kind: Service
metadata:
  name: flipflop-service
  namespace: statex-apps
  labels:
    app: flipflop-service
    component: api-gateway
    managed-by: k8s-migration
spec:
  type: ClusterIP
  selector:
    app: flipflop-service
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      name: http
---
