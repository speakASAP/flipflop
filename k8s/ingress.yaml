apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flipflop-service
  namespace: statex-apps
  labels:
    app: flipflop-service
    managed-by: k8s-migration
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - flipflop.alfares.cz
      secretName: flipflop-service-tls
  rules:
    - host: flipflop.alfares.cz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flipflop-service
                port:
                  number: 3000
